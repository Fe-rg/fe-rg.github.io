<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/style.css"><style>
.page-hero{min-height:30vh;display:flex;flex-direction:column;justify-content:center;padding:140px 8% 40px}
.page-hero p{color:#aaa;font-size:1.15rem;max-width:560px;line-height:1.7;margin-top:16px}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;max-width:900px;align-items:start}
.contact-links{display:flex;flex-direction:column;gap:16px;margin-top:8px}
.contact-link{display:flex;align-items:center;gap:16px;padding:18px 20px;background:#121226;border:1px solid #262648;border-radius:16px;color:#ddd;text-decoration:none;transition:border-color .2s}
.contact-link:hover{border-color:#c79cff}
.link-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#ff6cb5,#8b5cf6);flex-shrink:0}
.link-body small{display:block;color:#666;font-size:.8rem;margin-bottom:2px}
.form{display:flex;flex-direction:column;gap:14px}
.form input,.form textarea{background:#121226;border:1px solid #262648;border-radius:12px;padding:14px 16px;color:#fff;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .2s;resize:none}
.form input:focus,.form textarea:focus{border-color:#c79cff}
.form textarea{height:140px}
.form button{padding:14px;background:#1d1d34;color:#fff;border:1px solid #333;border-radius:12px;font-size:1rem;cursor:pointer;transition:border-color .2s}
.form button:hover{border-color:#c79cff}
@media(max-width:640px){.contact-grid{grid-template-columns:1fr}}
</style><title>Contact — Portfolio</title></head><body>

  <a href="index.html">Home</a><a href="about.html">About</a>
  <a href="projects.html">Projects</a>

  <a href="contact.html">Contact</a>
</nav>
<div class="page-hero">
  <h1>Get in <span>Touch</span></h1>
  <p>Whether it's a job opportunity, collaboration, or just to say hi — I'd love to hear from you.</p>
</div>
<section style="padding-top:0">
  <div class="contact-grid">
    <div>
      <h2 style="text-align:left;font-size:1.6rem;margin-top:0">Links</h2>
      <div class="contact-links">
        <a href="mailto:jkl.bader@proton.me" class="contact-link">
          <div class="link-icon"></div>
          <div class="link-body"><small>Email</small>jkl.bader@proton.me</div>
        </a>
        <a href="https://www.linkedin.com/in/joel-bader-2680b33b7/?skipRedirect=true" target="_blank" class="contact-link">
          <div class="link-icon"></div>
          <div class="link-body"><small>LinkedIn</small>My LinkedIn</div>
        </a>
        <a href="https://github.com/temp" target="_blank" class="contact-link">
          <div class="link-icon"></div>
          <div class="link-body"><small>GitHub</small>github.com/temp</div>
        </a>
      </div>
    </div>
    <div>
      <h2 style="text-align:left;font-size:1.6rem;margin-top:0">Send a message</h2>
      <div class="form">
        <input type="text" placeholder="Your name">
        <input type="email" placeholder="Your email">
        <textarea placeholder="Your message"></textarea>
        <button>Send ↗</button>
      </div>
    </div>
  </div>
</section>
<footer></footer>
<script src="js/main.js"></script></body></html>
